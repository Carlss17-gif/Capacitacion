<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="auth.css">
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
</head>
<!-- HEADER SUPERIOR -->
<div class="auth-header">
  <h1 class="titulo">Proyecto de Capacitación</h1>
  
  <img src="Tenedor.jpeg" class="logo left">
</div>
<body class="auth-page">

<div class="auth-container">
  <div class="auth-card">
    <h2>Registro</h2>

    <input id="id_empleado" placeholder="ID empleado">
    <input id="nombre" placeholder="Nombre completo">
    <input id="fecha" type="date">
    <input id="entrenador" placeholder="Entrenador">
    <input id="distrito" placeholder="Distrito">
    <input id="sucursal" placeholder="Sucursal">
    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">

    <button onclick="registrar()">Registrar</button>
  </div>
</div>

<script src="supabase.js"></script>
<script src="auth.js"></script>

</body>
</html>
